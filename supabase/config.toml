# Supabase project config.
# Plan 2026-06-03_tracking_algorithmic_rebuild.md §3.3 / §4 (Critique C2-#2).
#
# Bewusst MINIMAL gehalten: dieser config.toml existiert primär, um für die
# tracking-poll-Edge-Function `verify_jwt = false` zu setzen. Alle übrigen
# Plattform-Einstellungen (Auth-Provider, DB-Pooler, Storage, …) werden
# weiterhin im Supabase-Dashboard gepflegt, NICHT hier — damit dieser File
# keine Dashboard-Config überschreibt, die nicht im Repo gespiegelt ist.

# project_id ist der LOKALE Stack-Identifier (Container-Namespace), NICHT die
# Remote-Projekt-Ref. Muss dem CLI-Default (= Repo-Verzeichnisname) entsprechen,
# damit `supabase start/db reset` den bestehenden lokalen Stack
# (supabase_db_inventory_management) weiterverwendet statt einen neuen anzulegen.
project_id = "inventory_management"

# ── tracking-poll: JWT-Verifikation AUS ──────────────────────────────────
# PFLICHT-Prereq für den Event-Trigger (Migration
# 20260603081506_tracking_poll_event_trigger.sql): der Postgres-Trigger
# ruft die Function via net.http_post mit `Authorization: Bearer
# <CRON_SECRET>` (KEIN Supabase-JWT). Bei verify_jwt=true (Default ohne
# config) würde das Plattform-Gateway den Call mit 401 ablehnen, bevor der
# Function-Code (isCron-Pfad) überhaupt läuft. Die App-interne Auth-Matrix
# (isCron / isService / JWT-User → 401/403) bleibt im Function-Code intakt
# — dies deaktiviert NUR den Gateway-JWT-Check, keinen App-Auth-Check.
#
[functions.tracking-poll]
verify_jwt = false

# ── dpd-push: JWT-Verifikation AUS (DPD Tracking Push Webhook) ────────────
# DPDs Push-Server kann kein Supabase-JWT senden. Auth läuft stattdessen
# über das PFLICHT-Query-Token `token=<DPD_PUSH_TOKEN>` (Secret via
# `supabase secrets set`, fail-closed 403/503 in der Function) + Soft-Check
# der dokumentierten DPD-Absender-IP. Gleiches Muster wie tracking-poll.
[functions.dpd-push]
verify_jwt = false

# ── inbox-poll: JWT-Verifikation AUS (Fix 2026-06-03) ─────────────────────
# Befund via net._http_response: der pg_cron-Job `inbox-poll-5min` rief die
# Function mit `Authorization: Bearer <CRON_SECRET>` (KEIN JWT). Bei
# verify_jwt=true lehnte das Plattform-Gateway JEDEN Cron-Call mit 401
# `UNAUTHORIZED_INVALID_JWT_FORMAT` ab → automatisches Inbox-Polling (alle
# 5 Min) war faktisch tot; Mails (+ Auto-Tracking-Detection) kamen nur beim
# manuellen „Jetzt pollen" (User-JWT) rein. inbox-poll/index.ts macht seine
# Auth selbst (isCron / isService / JWT-User+Workspace-Scope → 401/403),
# daher ist verify_jwt=false sicher — gleiches Pattern wie tracking-poll /
# send-notifications. Stellt Auto-Polling + Auto-Detection wieder her.
[functions.inbox-poll]
verify_jwt = false

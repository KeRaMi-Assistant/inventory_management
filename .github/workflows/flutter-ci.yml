name: Flutter CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  flutter-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib/ test/
        continue-on-error: true

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test --coverage --reporter=expanded

      # Service-Layer-Coverage messen (CLAUDE.md-Ziel >60%). Aktuell
      # INFORMATIV (continue-on-error) — wird auf hartes Gate (exit 1 unter
      # Schwelle) hochgezogen, sobald die Baseline stabil >60% liegt.
      - name: Coverage report (lib/services)
        continue-on-error: true
        run: |
          if [ ! -f coverage/lcov.info ]; then echo "no lcov"; exit 0; fi
          awk '
            /^SF:.*lib\/services\// {insec=1} /^SF:/{if($0 !~ /lib\/services\//) insec=0}
            insec && /^DA:/ {tot++; split($0,a,","); if(a[2]+0>0) hit++}
            END { if(tot>0) printf "lib/services line coverage: %.1f%% (%d/%d)\n", 100*hit/tot, hit, tot; else print "lib/services: no DA lines" }
          ' coverage/lcov.info

      - name: Build (Web smoke)
        run: flutter build web --no-tree-shake-icons
        continue-on-error: true

  # Edge-Function / Tracking-Detection Tests (Deno). Lief bis 2026-06-04 in
  # KEINER CI — hätte u.a. den DE-Prefix-Detection-Regress gefangen. --no-check
  # überspringt das vorbestehende supabase-js-Generics-Typrauschen in den
  # index.ts-importierenden Suites; die Tests selbst laufen voll.
  deno-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Deno tests (edge functions + shared detection)
        run: deno test --allow-read --allow-net --allow-env --no-check supabase/functions/

<!DOCTYPE html>
<html lang="de">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description"
        content="CanLogistics — Inventar, Sendungsverfolgung und Verkäufe in einer App. Vom Wareneingang bis zum verkauften Stück. Automatisch.">
  <meta name="theme-color" content="#4338CA">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CanLogistics">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>CanLogistics</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Brand-Pre-Loader. Wird gezeigt, bevor Flutter den ersten Frame rendert,
    damit der User nicht in eine weiße Lücke schaut. Verschwindet automatisch,
    sobald die Flutter-App den Loader entfernt (s. main.dart → onRendered) oder
    spätestens beim ersten Repaint des Body-Containers.
  -->
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #312E81; }
    #brand-preloader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: linear-gradient(180deg, #6366F1 0%, #312E81 100%);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
      z-index: 9999;
      transition: opacity 0.32s ease;
    }
    #brand-preloader.fade-out { opacity: 0; pointer-events: none; }
    #brand-preloader img {
      width: 96px;
      height: 96px;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,0.25));
    }
    #brand-preloader .wm {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-top: 4px;
    }
    #brand-preloader .wm em {
      font-style: normal;
      font-weight: 500;
      color: rgba(255,255,255,0.78);
    }
    #brand-preloader .tag {
      font-size: 13px;
      color: rgba(255,255,255,0.72);
      letter-spacing: 0.1px;
    }
    #brand-preloader .spin {
      width: 22px;
      height: 22px;
      border: 2px solid rgba(255,255,255,0.32);
      border-top-color: #fff;
      border-radius: 50%;
      animation: brand-spin 0.9s linear infinite;
      margin-top: 6px;
    }
    @keyframes brand-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="brand-preloader" aria-label="CanLogistics lädt …">
    <img src="icons/Icon-192.png" alt="CanLogistics Logo">
    <div class="wm">Can<em>Logistics</em></div>
    <div class="tag">Vom Wareneingang bis zum verkauften Stück.</div>
    <div class="spin" role="progressbar"></div>
  </div>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Fade out the brand preloader once Flutter mounts. The Flutter runtime
    // dispatches a `flutter-first-frame` event the moment it has painted.
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('brand-preloader');
      if (!el) return;
      el.classList.add('fade-out');
      setTimeout(function () { el.remove(); }, 380);
    });
  </script>
</body>
</html>
